services:
  - type: web
    name: foodsprint
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --threads 4 --workers 1 run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: foodsprint-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FOODSPRINT_UPI_ID
        sync: false
      - key: FOODSPRINT_UPI_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: foodsprint-db
