name: FoodSprint CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: foodsprint
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foodsprint
      REDIS_URL: redis://localhost:6379/0
      APP_BASE_URL: http://127.0.0.1:5000
      FOODSPRINT_UPI_ID: foodsprint@upi
      FOODSPRINT_UPI_NAME: FoodSprint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall app run.py refresh_images.py

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t foodsprint:ci .

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
