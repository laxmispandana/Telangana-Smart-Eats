{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<section class="auth-shell">
    <form class="auth-card" method="post">
        <p class="eyebrow">Get started</p>
        <h1>Create your Telangana Smart Eats account</h1>
        <label>Full name<input type="text" name="name" required></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Phone<input type="tel" name="phone" required></label>
        <label>Location<input type="text" name="location" placeholder="Hyderabad, Telangana" required></label>
        <label>Password<input type="password" name="password" minlength="6" required></label>
        <button class="btn btn-primary" type="submit">Create account</button>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('main.login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
